<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klinik Puri Medika - Dashboard Pelayanan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300..1000;1,300..1000&display=swap" rel="stylesheet">
    <link rel="preload" href="/logo.png" as="image" type="image/png" fetchpriority="high">
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(to bottom right, #0f5144, #0d3d34, #07241e); color: white; font-family: 'Nunito', sans-serif; z-index: 9999;">
        <div style="margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center;">
          <div style="background: white; width: 8rem; height: 8rem; padding: 1rem; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
            <img src="/logo.png" alt="Logo Klinik Puri Medika" style="width: 100%; height: 100%; object-fit: contain;" fetchpriority="high">
          </div>
          <h1 style="font-size: 2.25rem; font-weight: 900; margin: 0 0 0.375rem 0; letter-spacing: -0.025em; text-align: center;">Klinik Puri Medika<span style="color: #5eead4;">.</span></h1>
          <p style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(153, 246, 228, 0.8); margin: 0;">Sistem Informasi Klinik &amp; Pelayanan</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
